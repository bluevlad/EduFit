server {
    listen 4070;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # /edufit/ 경로로 서비스 (게이트웨이 및 직접 접속 모두 지원)
    location /edufit/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /edufit/index.html;
    }

    # Backend API 프록시 (Docker 내부 통신)
    location /edufit/api/ {
        proxy_pass http://backend:9070/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 루트 접속 시 /edufit/으로 리다이렉트
    location = / {
        return 301 /edufit/;
    }
}
