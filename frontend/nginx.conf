server {
    listen 4070;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 (edufit.unmong.com/ 서브도메인 기반)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API 프록시 (Docker 내부 통신)
    location /api/ {
        proxy_pass http://backend:9070/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
