name: Deploy EduFit (macOS)

# 2026-05-01: backend/frontend 운영 중지 (gateway 분리 + 데이터 활용도 낮음)
# ai-crawler만 단독 배포. 재가동 필요시 docker compose --profile archived up -d 수동 실행.

on:
  push:
    branches: [ "prod" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.github/**/*.md'

jobs:
  deploy:
    name: Deploy ai-crawler to OrbStack Docker
    runs-on: [self-hosted, macos, orbstack]

    env:
      COMPOSE_FILE: docker-compose.prod.yml
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      NAVER_ID: ${{ secrets.NAVER_ID }}
      NAVER_PW: ${{ secrets.NAVER_PW }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        cat > .env << 'ENVEOF'
        DB_USER=${{ secrets.DB_USER }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DB_NAME=${{ secrets.DB_NAME }}
        DB_HOST=${{ secrets.DB_HOST }}
        DB_PORT=${{ secrets.DB_PORT }}
        NAVER_ID=${{ secrets.NAVER_ID }}
        NAVER_PW=${{ secrets.NAVER_PW }}
        CRAWL_LIMIT=50
        ENVEOF
        sed -i '' 's/^[[:space:]]*//' .env
      shell: bash

    - name: Stop existing ai-crawler
      run: |
        docker compose stop ai-crawler 2>/dev/null || true
        docker compose rm -f ai-crawler 2>/dev/null || true
      shell: bash

    - name: Ensure shared PostgreSQL is running
      run: |
        echo "Checking shared PostgreSQL..."
        for i in $(seq 1 15); do
          if docker exec postgresql pg_isready -U postgres > /dev/null 2>&1; then
            echo "Shared PostgreSQL is ready"
            break
          fi
          if [ $i -eq 15 ]; then
            echo "ERROR: Shared PostgreSQL is not running"
            exit 1
          fi
          sleep 2
        done
      shell: bash

    - name: Build and start ai-crawler
      run: |
        docker compose up -d --build ai-crawler
      shell: bash

    - name: Verify ai-crawler is running
      run: |
        echo "Waiting for ai-crawler to start..."
        sleep 5
        if docker ps --format '{{.Names}}' | grep -q '^edufit-ai-crawler$'; then
          echo "ai-crawler container is running"
          docker compose logs ai-crawler --tail=30
        else
          echo "ERROR: ai-crawler not running"
          docker compose logs ai-crawler --tail=50
          exit 1
        fi
      shell: bash

    - name: Deployment summary
      run: |
        echo "=== EduFit ai-crawler Deployment Complete ==="
        echo "backend/frontend는 운영 중지 (archived profile)."
        echo ""
        docker compose ps
      shell: bash
