# Production - Full Stack
# Usage: docker compose -f docker-compose.prod.yml up -d
# 보안 정보는 .env 파일에서 관리 (.env.example 참조)

services:
  backend:
    build: ./backend
    container_name: edufit-backend
    ports:
      - "9070:9070"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-edufit_svc}:${DB_PASSWORD:?DB_PASSWORD is required}@${DB_HOST:-postgresql}:${DB_PORT:-5432}/${DB_NAME:-edufit}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4070}
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - edufit-network
      - database-network
    restart: unless-stopped
    depends_on:
      - frontend

  frontend:
    build: ./frontend
    container_name: edufit-frontend
    ports:
      - "4070:4070"
    networks:
      - edufit-network
    restart: unless-stopped

networks:
  edufit-network:
    driver: bridge
  database-network:
    external: true
